# Cyber-Command Professional Data Layer (Cloud PostgreSQL)
# Injection: These variables are automatically provided by platforms like Railway, Supabase, or AWS RDS.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/fraud_db}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Fallback: Automated schema evolution for rapid deployment
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Security Core: Enforcing SSL/TLS for remote cloud connections
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# Server Port (Required for Railway)
server.port=${PORT:8080}
spring.application.name=Enterprise-Fraud-Intelligence

# Thymeleaf Configuration
spring.thymeleaf.cache=false
