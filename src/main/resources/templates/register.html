<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REQUEST CLEARANCE | VORTEX-PRIMUS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/vortex-primus.css}">
    <style>
        .auth-split-container {
            min-height: 100vh;
            display: flex;
        }
        .auth-brand-side {
            flex: 1.2;
            background: url('/images/neural_network.png') center/cover no-repeat;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px;
        }
        .auth-brand-side::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(2,6,23,0.95) 0%, rgba(34, 211, 238, 0.4) 100%);
        }
        .auth-form-side {
            flex: 1;
            background: var(--bg-darker);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        .auth-form-wrapper {
            width: 100%;
            max-width: 440px;
        }
        .brand-content {
            position: relative;
            z-index: 2;
            max-width: 500px;
        }
        .form-input-premium {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 16px 20px;
            border-radius: 12px;
            width: 100%;
            transition: var(--transition);
        }
        .form-input-premium:focus {
            background: rgba(255,255,255,0.05);
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            outline: none;
        }
        @media (max-width: 991px) {
            .auth-brand-side { display: none; }
        }
    </style>
</head>
<body class="fade-in">

    <div class="auth-split-container">
        <!-- Brand Side -->
        <div class="auth-brand-side">
            <div class="brand-content">
                <a th:href="@{/}" class="d-flex align-items-center gap-2 text-decoration-none mb-5">
                    <i class="bi bi-radar text-cyan display-4"></i>
                    <span class="fs-2 fw-800 text-white" style="letter-spacing: -2px;">VORTEX-PRIMUS</span>
                </a>
                <h1 class="display-3 fw-800 text-white mb-4">Neural <br><span class="gradient-text">Matrix</span></h1>
                <p class="text-white-50 fs-5 mb-5">Provision your secure core identity and join the next generation of enterprise tactical defense.</p>
                <div class="glass-card p-4" style="background: rgba(255,255,255,0.05);">
                    <div class="stat-value gradient-text" style="-webkit-text-fill-color: initial; background: linear-gradient(135deg, white, var(--accent-purple)); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;">99.9%</div>
                    <div class="d-flex align-items-center gap-3">
                        <i class="bi bi-cpu-fill text-cyan fs-2"></i>
                        <div>
                            <div class="text-white fw-700">NEURAL_VERIFY v2.4</div>
                            <div class="text-white-50 small mono">SYNCHRONIZING GENETIC HASH...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Form Side -->
        <div class="auth-form-side">
            <div class="auth-form-wrapper">
                <div class="mb-5">
                    <h2 class="fw-800 text-white mb-2">Request Access</h2>
                    <p class="text-muted">Register for elite system clearance.</p>
                </div>

                <div th:if="${param.error}" class="alert alert-danger border-0 bg-danger bg-opacity-10 text-danger rounded-3 p-3 mb-4 d-flex align-items-center gap-3">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span class="small fw-600" th:text="${param.error[0]}">Registration error</span>
                </div>

                <form th:action="@{/register}" method="post">
                    <div class="mb-4">
                        <label class="small fw-700 text-muted text-uppercase mb-2 d-block" style="letter-spacing: 0.1em;">Codename (ID)</label>
                        <input type="text" name="username" class="form-input-premium" placeholder="specter_01" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="small fw-700 text-muted text-uppercase mb-2 d-block" style="letter-spacing: 0.1em;">Contact Frequency (Email)</label>
                        <input type="email" name="email" class="form-input-premium" placeholder="operator@vortex-primus.io" required>
                    </div>
                    <div class="mb-5">
                        <label class="small fw-700 text-muted text-uppercase mb-2 d-block" style="letter-spacing: 0.1em;">Passcode</label>
                        <input type="password" name="password" class="form-input-premium" placeholder="••••••••" required minlength="6">
                    </div>
                    
                    <button type="submit" class="btn-premium w-100 py-3 justify-content-center fs-6 mb-4">
                        Provision Core <i class="bi bi-shield-plus"></i>
                    </button>

                    <div class="text-center">
                        <span class="text-muted small">Already cleared?</span>
                        <a th:href="@{/login}" class="text-primary text-decoration-none small fw-700 ms-1">ENTER HUB</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
