<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Security | Request Access</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/cyber-command.css}">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .auth-card {
            width: 100%;
            max-width: 450px;
            padding: 2.5rem;
        }
        .form-control-dark, .form-select-dark {
            background-color: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            color: white;
            padding: 0.8rem 1rem;
        }
        .form-control-dark:focus, .form-select-dark:focus {
            background-color: rgba(255,255,255,0.08);
            border-color: var(--primary-color);
            color: white;
            box-shadow: none;
        }
        .form-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
        }
        option { background-color: var(--bg-secondary); color: white; }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>

    <div class="container auth-container">
        <div class="glass-panel auth-card">
            <div class="text-center mb-4">
                <i class="bi bi-person-plus-fill text-primary fs-1 mb-3 d-inline-block"></i>
                <h3 class="fw-bold mb-1">Create Account</h3>
                <p class="text-dim small">Provision new enterprise credentials</p>
            </div>

            <div th:if="${param.success}" class="alert alert-success border-0 bg-success bg-opacity-10 text-success rounded-3 p-3 mb-4 d-flex align-items-center gap-2">
                <i class="bi bi-check-circle-fill"></i>
                <span class="small fw-medium">Account provisioned. You can now <a href="/login" class="alert-link">Sign In</a>.</span>
            </div>

            <form th:action="@{/register}" th:object="${user}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Enterprise ID (Username)</label>
                    <input type="text" id="username" th:field="*{username}" class="form-control form-control-dark rounded-3" required autofocus placeholder="e.g. jdoe">
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label">Passcode</label>
                    <input type="password" id="password" th:field="*{password}" class="form-control form-control-dark rounded-3" required placeholder="••••••••">
                </div>

                <div class="mb-4">
                    <label for="role" class="form-label">Clearance Level (Role)</label>
                    <select id="role" th:field="*{role}" class="form-select form-select-dark rounded-3">
                        <option value="USER">Standard User</option>
                        <option value="ADMIN">System Administrator</option>
                    </select>
                </div>

                <button type="submit" class="btn-primary-modern w-100 mb-4 border-0">Provision Account</button>

                <div class="text-center">
                    <p class="text-dim small mb-0">Already provisioned? <a href="/login" class="text-primary text-decoration-none fw-medium">Sign In</a></p>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
